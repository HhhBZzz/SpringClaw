name: Feature request
description: Propose a focused runtime, tool, memory, channel, or console improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Chat runtime
        - Model provider
        - Memory
        - Tool governance
        - Skill runtime
        - Channel adapter
        - Admin console
        - Documentation
        - Other
    validations:
      required: true
