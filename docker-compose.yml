services:
  mysql:
    image: mysql:8.0
    container_name: openclaw-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: openclaw
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - openclaw-mysql-data:/var/lib/mysql
      - ./src/main/resources/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis/redis-stack-server:latest
    container_name: openclaw-redis
    restart: unless-stopped
    environment:
      # Do not override the image entrypoint/command with plain redis-server,
      # otherwise Redis Stack modules (including RediSearch) will not be loaded.
      REDIS_ARGS: "--appendonly yes"
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - openclaw-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  rabbitmq:
    image: rabbitmq:3-management
    container_name: openclaw-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: 18080
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: openclaw
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      OPENCLAW_PERSISTENCE_DB_ENABLED: "true"
      OPENCLAW_AUTH_REDIS_ENABLED: "true"
      OPENCLAW_GUARD_REDIS_ENABLED: "true"
      OPENCLAW_TOOLS_GUARD_REDIS_ENABLED: "true"
      OPENCLAW_FEISHU_LONG_CONNECTION_ENABLED: "false"
      OPENCLAW_FEISHU_OUTBOUND_ENABLED: "false"
      OPENCLAW_AI_ACTIVE_PROVIDER: ${OPENCLAW_AI_ACTIVE_PROVIDER:-primary}
      OPENCLAW_PRIMARY_ENABLED: ${OPENCLAW_PRIMARY_ENABLED:-true}
      OPENCLAW_PRIMARY_API_KEY: ${OPENCLAW_PRIMARY_API_KEY:-}
      OPENCLAW_PRIMARY_BASE_URL: ${OPENCLAW_PRIMARY_BASE_URL:-https://api.zhongzhuan.win}
      OPENCLAW_PRIMARY_MODEL: ${OPENCLAW_PRIMARY_MODEL:-claude-opus-4-6}
      OPENCLAW_QWEN_ENABLED: ${OPENCLAW_QWEN_ENABLED:-true}
      OPENCLAW_QWEN_API_KEY: ${OPENCLAW_QWEN_API_KEY:-}
      OPENCLAW_QWEN_BASE_URL: ${OPENCLAW_QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      OPENCLAW_QWEN_MODEL: ${OPENCLAW_QWEN_MODEL:-qwen3.5-plus}
      OPENCLAW_CODING_PLAN_ENABLED: ${OPENCLAW_CODING_PLAN_ENABLED:-true}
      OPENCLAW_CODING_PLAN_API_KEY: ${OPENCLAW_CODING_PLAN_API_KEY:-}
      OPENCLAW_CODING_PLAN_BASE_URL: ${OPENCLAW_CODING_PLAN_BASE_URL:-https://coding.dashscope.aliyuncs.com/v1}
      OPENCLAW_CODING_PLAN_MODEL: ${OPENCLAW_CODING_PLAN_MODEL:-qwen3.5-plus}
    ports:
      - "18080:18080"
    volumes:
      - ./skills:/app/skills
      - ./SOUL.md:/app/SOUL.md:ro

volumes:
  openclaw-mysql-data:
  openclaw-redis-data:
