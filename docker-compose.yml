services:
  mysql:
    image: mysql:8.0
    container_name: springclaw-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DB:-springclaw}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - springclaw-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD:-root} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis/redis-stack-server:latest
    container_name: springclaw-redis
    restart: unless-stopped
    environment:
      # Do not override the image entrypoint/command with plain redis-server,
      # otherwise Redis Stack modules (including RediSearch) will not be loaded.
      REDIS_ARGS: "--appendonly yes"
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - springclaw-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  rabbitmq:
    image: rabbitmq:3-management
    container_name: springclaw-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: springclaw-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVER_PORT: 18080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DB:-springclaw}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      SPRINGCLAW_PERSISTENCE_DB_ENABLED: "true"
      SPRINGCLAW_AUTH_REDIS_ENABLED: "true"
      SPRINGCLAW_GUARD_REDIS_ENABLED: "true"
      SPRINGCLAW_TOOLS_GUARD_REDIS_ENABLED: "true"
      SPRINGCLAW_FEISHU_LONG_CONNECTION_ENABLED: "false"
      SPRINGCLAW_FEISHU_OUTBOUND_ENABLED: "false"
      SPRINGCLAW_AI_ACTIVE_PROVIDER: ${SPRINGCLAW_AI_ACTIVE_PROVIDER:-primary}
      SPRINGCLAW_PRIMARY_ENABLED: ${SPRINGCLAW_PRIMARY_ENABLED:-true}
      SPRINGCLAW_PRIMARY_API_KEY: ${SPRINGCLAW_PRIMARY_API_KEY:-}
      SPRINGCLAW_PRIMARY_BASE_URL: ${SPRINGCLAW_PRIMARY_BASE_URL:-https://api.zhongzhuan.win}
      SPRINGCLAW_PRIMARY_MODEL: ${SPRINGCLAW_PRIMARY_MODEL:-claude-opus-4-6}
      SPRINGCLAW_QWEN_ENABLED: ${SPRINGCLAW_QWEN_ENABLED:-true}
      SPRINGCLAW_QWEN_API_KEY: ${SPRINGCLAW_QWEN_API_KEY:-}
      SPRINGCLAW_QWEN_BASE_URL: ${SPRINGCLAW_QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      SPRINGCLAW_QWEN_MODEL: ${SPRINGCLAW_QWEN_MODEL:-qwen3.5-plus}
      SPRINGCLAW_CODING_PLAN_ENABLED: ${SPRINGCLAW_CODING_PLAN_ENABLED:-true}
      SPRINGCLAW_CODING_PLAN_API_KEY: ${SPRINGCLAW_CODING_PLAN_API_KEY:-}
      SPRINGCLAW_CODING_PLAN_BASE_URL: ${SPRINGCLAW_CODING_PLAN_BASE_URL:-https://coding.dashscope.aliyuncs.com/v1}
      SPRINGCLAW_CODING_PLAN_MODEL: ${SPRINGCLAW_CODING_PLAN_MODEL:-qwen3.5-plus}
    ports:
      - "18080:18080"
    volumes:
      - ./skills:/app/skills
      - ./SOUL.md:/app/SOUL.md:ro

volumes:
  springclaw-mysql-data:
  springclaw-redis-data:
