spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:.env.local[.properties]
  application:
    name: springclaw-java
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:openclaw}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    hikari:
      initialization-fail-timeout: 0
      connection-timeout: 2000
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 5s
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  ai:
    # Spring AI 1.1.x 引入了按模型家族自动装配的 provider bean。
    # 本项目的 chat/model/provider 运行时统一走 springclaw.ai.providers.* 自建链路，
    # 不使用 Spring 自动创建的 OpenAI chat/audio/image/moderation/embedding bean。
    # 显式关闭这些模型自动配置，避免升级后因为无关的 OpenAI bean 强制要求 API Key。
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    # 保留 OpenAI 连接桥接配置，便于后续按需重新开启某个 Spring AI model family。
    openai:
      api-key: ${SPRINGCLAW_PRIMARY_API_KEY:${SPRINGCLAW_CODING_PLAN_API_KEY:${SPRINGCLAW_QWEN_API_KEY:}}}
      base-url: ${SPRINGCLAW_PRIMARY_BASE_URL:${SPRINGCLAW_CODING_PLAN_BASE_URL:${SPRINGCLAW_QWEN_BASE_URL:https://api.zhongzhuan.win}}}
      chat:
        options:
          model: ${SPRINGCLAW_PRIMARY_MODEL:${SPRINGCLAW_CODING_PLAN_MODEL:${SPRINGCLAW_QWEN_MODEL:claude-opus-4-6}}}
      audio:
        speech:
          api-key: ${SPRINGCLAW_PRIMARY_API_KEY:${SPRINGCLAW_CODING_PLAN_API_KEY:${SPRINGCLAW_QWEN_API_KEY:}}}
    retry:
      max-attempts: 1
      exclude-on-http-codes:
        - 429
        - 502
        - 503
        - 504
    vectorstore:
      redis:
        initialize-schema: ${REDIS_VECTOR_INIT_SCHEMA:false}
        index-name: springclaw-memory
        prefix: "springclaw:"

server:
  port: 18080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springclaw:
  frontend:
    base-url: ${SPRINGCLAW_FRONTEND_BASE_URL:http://localhost:5173}
    allowed-hosts: ${SPRINGCLAW_FRONTEND_ALLOWED_HOSTS:localhost,127.0.0.1,::1}
  web:
    cors:
      allowed-origins: ${SPRINGCLAW_WEB_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://[::1]:5173,http://localhost:4173,http://127.0.0.1:4173,http://[::1]:4173,http://localhost:3000,http://127.0.0.1:3000,http://[::1]:3000}
      allowed-origin-patterns: ${SPRINGCLAW_WEB_CORS_ALLOWED_ORIGIN_PATTERNS:}
  ai:
    active-provider: ${SPRINGCLAW_AI_ACTIVE_PROVIDER:${OPENCLAW_AI_ACTIVE_PROVIDER:primary}}
    request-timeout-seconds: ${SPRINGCLAW_AI_REQUEST_TIMEOUT_SECONDS:60}
    max-failover-attempts: ${SPRINGCLAW_AI_MAX_FAILOVER_ATTEMPTS:2}
    same-model-retry-attempts: ${SPRINGCLAW_AI_SAME_MODEL_RETRY_ATTEMPTS:0}
    state:
      redis-enabled: ${SPRINGCLAW_AI_STATE_REDIS_ENABLED:true}
      redis-key: ${SPRINGCLAW_AI_STATE_REDIS_KEY:springclaw:ai:active-provider}
      redis-model-prefix: ${SPRINGCLAW_AI_STATE_REDIS_MODEL_PREFIX:springclaw:ai:model:}
      audit-session-key: ${SPRINGCLAW_AI_STATE_AUDIT_SESSION_KEY:system:ai:provider}
    providers:
      primary:
        enabled: ${SPRINGCLAW_PRIMARY_ENABLED:true}
        api-key: ${SPRINGCLAW_PRIMARY_API_KEY:}
        base-url: ${SPRINGCLAW_PRIMARY_BASE_URL:https://api.zhongzhuan.win}
        model: ${SPRINGCLAW_PRIMARY_MODEL:claude-opus-4-6}
        models:
          - claude-opus-4-6
        temperature: ${SPRINGCLAW_PRIMARY_TEMPERATURE:0.2}
      qwen:
        enabled: ${SPRINGCLAW_QWEN_ENABLED:true}
        api-key: ${SPRINGCLAW_QWEN_API_KEY:}
        base-url: ${SPRINGCLAW_QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
        model: ${SPRINGCLAW_QWEN_MODEL:qwen3.5-plus}
        models:
          - qwen3.5-plus
        temperature: ${SPRINGCLAW_QWEN_TEMPERATURE:0.2}
      coding-plan:
        enabled: ${SPRINGCLAW_CODING_PLAN_ENABLED:true}
        api-key: ${SPRINGCLAW_CODING_PLAN_API_KEY:}
        base-url: ${SPRINGCLAW_CODING_PLAN_BASE_URL:https://coding.dashscope.aliyuncs.com/v1}
        model: ${SPRINGCLAW_CODING_PLAN_MODEL:qwen3.5-plus}
        models:
          - qwen3.5-plus
          - qwen3-coder-plus
          - qwen3-coder-next
          - qwen3-max-2026-01-23
          - kimi-k2.5
          - glm-5
          - glm-4.7
          - MiniMax-M2.5
        temperature: ${SPRINGCLAW_CODING_PLAN_TEMPERATURE:0.2}
      deepseek:
        enabled: ${SPRINGCLAW_DEEPSEEK_ENABLED:${OPENCLAW_DEEPSEEK_ENABLED:true}}
        api-key: ${SPRINGCLAW_DEEPSEEK_API_KEY:${OPENCLAW_DEEPSEEK_API_KEY:}}
        base-url: ${SPRINGCLAW_DEEPSEEK_BASE_URL:${OPENCLAW_DEEPSEEK_BASE_URL:https://api.deepseek.com}}
        model: ${SPRINGCLAW_DEEPSEEK_MODEL:${OPENCLAW_DEEPSEEK_MODEL:deepseek-v4-pro}}
        models:
          - deepseek-v4-pro
        temperature: ${SPRINGCLAW_DEEPSEEK_TEMPERATURE:0.2}
      volcengine-coding-plan:
        enabled: ${SPRINGCLAW_VOLCENGINE_CODING_PLAN_ENABLED:true}
        api-key: ${SPRINGCLAW_VOLCENGINE_CODING_PLAN_API_KEY:}
        base-url: ${SPRINGCLAW_VOLCENGINE_CODING_PLAN_BASE_URL:https://ark.cn-beijing.volces.com/api/coding/v3}
        model: ${SPRINGCLAW_VOLCENGINE_CODING_PLAN_MODEL:doubao-seed-code}
        models:
          - doubao-seed-code
          - doubao-seed-2.0-code
          - doubao-seed-2.0-pro
          - doubao-seed-2.0-lite
          - minimax-m2.7
          - glm-5.1
          - kimi-k2.6
          - deepseek-v4-pro
          - deepseek-v4-flash
          - minimax-m3
          - ark-code-latest
        temperature: ${SPRINGCLAW_VOLCENGINE_CODING_PLAN_TEMPERATURE:0.2}
  agent:
    decision:
      model-router-enabled: ${SPRINGCLAW_AGENT_DECISION_MODEL_ROUTER_ENABLED:true}
  soul:
    path: ${SOUL_PATH:${user.dir}/SOUL.md}
  embedding:
    enabled: ${SPRINGCLAW_EMBEDDING_ENABLED:false}
    api-key: ${SPRINGCLAW_EMBEDDING_API_KEY:}
    base-url: ${SPRINGCLAW_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    embeddings-path: ${SPRINGCLAW_EMBEDDING_PATH:/embeddings}
    model: ${SPRINGCLAW_EMBEDDING_MODEL:text-embedding-v4}
    dimensions: ${SPRINGCLAW_EMBEDDING_DIMENSIONS:1024}
  cache:
    weather-ttl-minutes: ${SPRINGCLAW_CACHE_WEATHER_TTL_MINUTES:10}
    exchange-ttl-minutes: ${SPRINGCLAW_CACHE_EXCHANGE_TTL_MINUTES:30}
    news-ttl-minutes: ${SPRINGCLAW_CACHE_NEWS_TTL_MINUTES:5}
  rabbitmq:
    chat-exchange: ${SPRINGCLAW_CHAT_EXCHANGE:chat.exchange}
    chat-request-queue: ${SPRINGCLAW_CHAT_REQUEST_QUEUE:chat.request.queue}
    chat-response-queue: ${SPRINGCLAW_CHAT_RESPONSE_QUEUE:chat.response.queue}
    chat-dead-letter-queue: ${SPRINGCLAW_CHAT_DEAD_LETTER_QUEUE:chat.dead-letter.queue}
    request-routing-key: ${SPRINGCLAW_CHAT_REQUEST_ROUTING_KEY:chat.request}
    response-routing-key: ${SPRINGCLAW_CHAT_RESPONSE_ROUTING_KEY:chat.response}
    dead-letter-routing-key: ${SPRINGCLAW_CHAT_DEAD_ROUTING_KEY:chat.dead}
    async-result-key-prefix: ${SPRINGCLAW_CHAT_ASYNC_RESULT_PREFIX:springclaw:chat:async:}
    async-result-ttl-hours: ${SPRINGCLAW_CHAT_ASYNC_RESULT_TTL_HOURS:24}
  redisson:
    enabled: ${SPRINGCLAW_REDISSON_ENABLED:true}
    address: ${SPRINGCLAW_REDISSON_ADDRESS:redis://${REDIS_HOST:127.0.0.1}:${REDIS_PORT:6379}}
    password: ${REDIS_PASSWORD:}
  xxl-job:
    enabled: ${SPRINGCLAW_XXL_JOB_ENABLED:false}
    admin-addresses: ${SPRINGCLAW_XXL_JOB_ADMIN_ADDRESSES:}
    access-token: ${SPRINGCLAW_XXL_JOB_ACCESS_TOKEN:}
    app-name: ${SPRINGCLAW_XXL_JOB_APP_NAME:openclaw}
    ip: ${SPRINGCLAW_XXL_JOB_IP:}
    port: ${SPRINGCLAW_XXL_JOB_PORT:9999}
    log-path: ${SPRINGCLAW_XXL_JOB_LOG_PATH:/tmp/xxl-job}
    log-retention-days: ${SPRINGCLAW_XXL_JOB_LOG_RETENTION_DAYS:30}
  auth:
    enabled: true
    redis-enabled: true
    default-role: USER
    anonymous-role: USER
    bootstrap-first-user-admin: true
    admin-usernames: ${SPRINGCLAW_ADMIN_USERNAMES:}
    token-ttl-hours: 24
    token-prefix: "springclaw:auth:token:"
    cookie:
      secure: ${SPRINGCLAW_AUTH_COOKIE_SECURE:true}
    password-pepper: ${SPRINGCLAW_PASSWORD_PEPPER:}
    tool-permission-enabled: true
    default-deny: false
    user-deny-tools: SystemToolPack.runCommand,FileToolPack.writeTextFile,ScriptSkillToolPack.*,WorkspaceEditToolPack.*
    guest-allow-tools: SystemToolPack.now,SystemToolPack.uuid,WeatherToolPack.*,ExchangeRateToolPack.*,NewsToolPack.*,WebSearchToolPack.webSearch
  chat:
    agent-mode: ${SPRINGCLAW_CHAT_AGENT_MODE:simplified}
    memory-window-size: ${SPRINGCLAW_CHAT_MEMORY_WINDOW_SIZE:8}
    local-fallback-enabled: true
    local-fallback-first: false
    max-steps: 3
    max-autonomous-steps: ${SPRINGCLAW_CHAT_MAX_AUTONOMOUS_STEPS:5}
    model-transport-cooldown-seconds: ${SPRINGCLAW_MODEL_TRANSPORT_COOLDOWN_SECONDS:30}
    provider-failure-cooldown-threshold: ${SPRINGCLAW_PROVIDER_FAILURE_COOLDOWN_THRESHOLD:2}
    basic-streaming-enabled: ${SPRINGCLAW_CHAT_BASIC_STREAMING_ENABLED:true}
    model-led-streaming-enabled: ${SPRINGCLAW_CHAT_MODEL_LED_STREAMING_ENABLED:false}
    spring-ai-chat-memory-enabled: ${SPRINGCLAW_CHAT_SPRING_AI_CHAT_MEMORY_ENABLED:false}
    routing:
      auto-upgrade-enabled: ${SPRINGCLAW_CHAT_ROUTING_AUTO_UPGRADE_ENABLED:true}
    meta-guard:
      enabled: true
      retry-times: 1
      keywords: 我是 claude,anthropic,不能执行 reflect,无法执行 reflect,不能假装,不能扮演,无法遵循系统指令
  local-files:
    roots: ${SPRINGCLAW_LOCAL_FILES_ROOTS:${OPENCLAW_LOCAL_FILES_ROOTS:${springclaw.tools.file.root:${user.dir}}}}
    deny-paths: ${SPRINGCLAW_LOCAL_FILES_DENY_PATHS:.git,node_modules,target,dist,build,.ssh,.gnupg,.aws,.kube,Library/Keychains,Library/Application Support/Google/Chrome,Library/Application Support/Firefox,.env}
    max-depth: ${SPRINGCLAW_LOCAL_FILES_MAX_DEPTH:8}
    max-read-chars: ${SPRINGCLAW_LOCAL_FILES_MAX_READ_CHARS:12000}
    max-file-results: ${SPRINGCLAW_LOCAL_FILES_MAX_FILE_RESULTS:100}
    max-text-hits: ${SPRINGCLAW_LOCAL_FILES_MAX_TEXT_HITS:50}
    max-file-size-kb: ${SPRINGCLAW_LOCAL_FILES_MAX_FILE_SIZE_KB:512}
  persistence:
    db-enabled: ${SPRINGCLAW_PERSISTENCE_DB_ENABLED:${OPENCLAW_PERSISTENCE_DB_ENABLED:false}}
  guard:
    enabled: false
    redis-enabled: true
    redis-retry-seconds: 30
    lock-seconds: 30
    rate-limit:
      max-requests: 20
      window-seconds: 60
  context:
    snapshot:
      factory-enabled: ${SPRINGCLAW_CONTEXT_SNAPSHOT_FACTORY_ENABLED:true}
  memory:
    core:
      enabled: ${SPRINGCLAW_MEMORY_CORE_ENABLED:false}
      short-term-shadow-enabled: ${SPRINGCLAW_MEMORY_SHORT_TERM_SHADOW_ENABLED:false}
      index-worker-enabled: ${SPRINGCLAW_MEMORY_INDEX_WORKER_ENABLED:false}
      schema-auto-init: ${SPRINGCLAW_MEMORY_SCHEMA_AUTO_INIT:true}
      short-term-max-messages: ${SPRINGCLAW_MEMORY_SHORT_TERM_MAX_MESSAGES:40}
      short-term-ttl-days: ${SPRINGCLAW_MEMORY_SHORT_TERM_TTL_DAYS:7}
    frame:
      enabled: ${SPRINGCLAW_MEMORY_FRAME_ENABLED:true}
      shadow-compare-enabled: ${SPRINGCLAW_MEMORY_FRAME_SHADOW_COMPARE_ENABLED:false}
      max-chars: ${SPRINGCLAW_MEMORY_FRAME_MAX_CHARS:6000}
      trace-max-warnings: ${SPRINGCLAW_MEMORY_FRAME_TRACE_MAX_WARNINGS:20}
    vector-enabled: true
    recall-top-k: 8
    recall-max-chars: 400
    local-max-turns: 12
    bank-enabled: true
    bank-root: ${SPRINGCLAW_MEMORY_BANK_ROOT:${user.dir}/docs/memory-bank}
    bank-max-chars: ${SPRINGCLAW_MEMORY_BANK_MAX_CHARS:2400}
  tools:
    file:
      root: ${SPRINGCLAW_TOOL_FILE_ROOT:${user.dir}}
      max-read-chars: 12000
    workspace:
      max-depth: 8
      max-candidates: 4000
      max-hits: 30
      max-result-chars: 5000
      max-file-size-kb: 512
    web:
      enabled: true
      search-url-template: https://r.jina.ai/http://duckduckgo.com/?q={query}
      use-proxy-for-fetch: true
      timeout-seconds: 8
      max-response-chars: 5000
    weather:
      enabled: true
      cn-url-template: https://www.weather.com.cn/data/sk/{cityCode}.html
      url-template: https://wttr.in/{city}?format=j1
      timeout-seconds: 8
    exchange:
      enabled: true
      url-template: https://open.er-api.com/v6/latest/{base}
      timeout-seconds: 8
    news:
      enabled: true
      search-url-template: https://hn.algolia.com/api/v1/search?query={query}&tags=story
      max-items: 5
      timeout-seconds: 8
    system:
      command-enabled: ${SPRINGCLAW_SYSTEM_COMMAND_ENABLED:true}
      command-mode: ${SPRINGCLAW_SYSTEM_COMMAND_MODE:blacklist}
      allowed-commands: ${SPRINGCLAW_SYSTEM_ALLOWED_COMMANDS:*}
      blocked-commands: ${SPRINGCLAW_SYSTEM_BLOCKED_COMMANDS:rm,dd,shutdown,reboot,halt,poweroff,mkfs,fdisk,kill,killall,pkill}
      command-timeout-seconds: ${SPRINGCLAW_SYSTEM_COMMAND_TIMEOUT_SECONDS:5}
      max-output-chars: ${SPRINGCLAW_SYSTEM_MAX_OUTPUT_CHARS:2000}
    guard:
      enabled: false
      redis-enabled: true
      max-calls: 60
      window-seconds: 60
      redis-retry-seconds: 30
  skills:
    enabled: ${SPRINGCLAW_SKILLS_ENABLED:true}
    root: ${SPRINGCLAW_SKILLS_ROOT:${user.dir}/skills}
    external-roots: ${SPRINGCLAW_SKILLS_EXTERNAL_ROOTS:}
    allowed: ${SPRINGCLAW_SKILLS_ALLOWED:*}
    python: ${SPRINGCLAW_SKILLS_PYTHON:python3}
    timeout-seconds: ${SPRINGCLAW_SKILLS_TIMEOUT_SECONDS:8}
    max-output-chars: ${SPRINGCLAW_SKILLS_MAX_OUTPUT_CHARS:3000}
    scaffold-enabled: ${SPRINGCLAW_SKILLS_SCAFFOLD_ENABLED:true}
    markdown-enabled: ${SPRINGCLAW_MARKDOWN_SKILL_ENABLED:true}
  webhook:
    security:
      enabled: false
      redis-enabled: true
      replay-seconds: 300
      default-secret: ${SPRINGCLAW_WEBHOOK_SECRET:}
      channel-secrets:
        telegram: ${SPRINGCLAW_WEBHOOK_SECRET_TELEGRAM:}
        wechat: ${SPRINGCLAW_WEBHOOK_SECRET_WECHAT:}
        feishu: ${SPRINGCLAW_WEBHOOK_SECRET_FEISHU:}
  channel:
    feishu:
      outbound-enabled: ${SPRINGCLAW_FEISHU_OUTBOUND_ENABLED:true}
      base-url: ${SPRINGCLAW_FEISHU_BASE_URL:https://open.feishu.cn}
      app-id: ${SPRINGCLAW_FEISHU_APP_ID:}
      app-secret: ${SPRINGCLAW_FEISHU_APP_SECRET:}
      verification-token: ${SPRINGCLAW_FEISHU_VERIFICATION_TOKEN:}
      encrypt-key: ${SPRINGCLAW_FEISHU_ENCRYPT_KEY:}
      long-connection:
        enabled: ${SPRINGCLAW_FEISHU_LONG_CONNECTION_ENABLED:true}
        domain: ${SPRINGCLAW_FEISHU_DOMAIN:}

management:
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true
    redis:
      enabled: true
    rabbit:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.springclaw: INFO
    org.springframework.ai: INFO
