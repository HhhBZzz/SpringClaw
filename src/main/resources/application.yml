spring:
  application:
    name: openclaw-java
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:openclaw}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    hikari:
      initialization-fail-timeout: 0
      connection-timeout: 2000
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 5s
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  ai:
    # Spring AI 1.1.x 引入了按模型家族自动装配的 provider bean。
    # 本项目的 chat/model/provider 运行时统一走 openclaw.ai.providers.* 自建链路，
    # 不使用 Spring 自动创建的 OpenAI chat/audio/image/moderation/embedding bean。
    # 显式关闭这些模型自动配置，避免升级后因为无关的 OpenAI bean 强制要求 API Key。
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    # 保留 OpenAI 连接桥接配置，便于后续按需重新开启某个 Spring AI model family。
    openai:
      api-key: ${OPENCLAW_PRIMARY_API_KEY:${OPENCLAW_CODING_PLAN_API_KEY:${OPENCLAW_QWEN_API_KEY:}}}
      base-url: ${OPENCLAW_PRIMARY_BASE_URL:${OPENCLAW_CODING_PLAN_BASE_URL:${OPENCLAW_QWEN_BASE_URL:https://api.zhongzhuan.win}}}
      chat:
        options:
          model: ${OPENCLAW_PRIMARY_MODEL:${OPENCLAW_CODING_PLAN_MODEL:${OPENCLAW_QWEN_MODEL:claude-opus-4-6}}}
      audio:
        speech:
          api-key: ${OPENCLAW_PRIMARY_API_KEY:${OPENCLAW_CODING_PLAN_API_KEY:${OPENCLAW_QWEN_API_KEY:}}}
    retry:
      max-attempts: 1
      exclude-on-http-codes:
        - 429
        - 502
        - 503
        - 504
    vectorstore:
      redis:
        initialize-schema: ${REDIS_VECTOR_INIT_SCHEMA:false}
        index-name: openclaw-memory
        prefix: "openclaw:"

server:
  port: 18080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

openclaw:
  ai:
    active-provider: ${OPENCLAW_AI_ACTIVE_PROVIDER:primary}
    request-timeout-seconds: ${OPENCLAW_AI_REQUEST_TIMEOUT_SECONDS:12}
    max-failover-attempts: ${OPENCLAW_AI_MAX_FAILOVER_ATTEMPTS:1}
    state:
      redis-enabled: ${OPENCLAW_AI_STATE_REDIS_ENABLED:true}
      redis-key: ${OPENCLAW_AI_STATE_REDIS_KEY:openclaw:ai:active-provider}
      redis-model-prefix: ${OPENCLAW_AI_STATE_REDIS_MODEL_PREFIX:openclaw:ai:model:}
      audit-session-key: ${OPENCLAW_AI_STATE_AUDIT_SESSION_KEY:system:ai:provider}
    providers:
      primary:
        enabled: ${OPENCLAW_PRIMARY_ENABLED:true}
        api-key: ${OPENCLAW_PRIMARY_API_KEY:}
        base-url: ${OPENCLAW_PRIMARY_BASE_URL:https://api.zhongzhuan.win}
        model: ${OPENCLAW_PRIMARY_MODEL:claude-opus-4-6}
        models:
          - claude-opus-4-6
        temperature: ${OPENCLAW_PRIMARY_TEMPERATURE:0.2}
      qwen:
        enabled: ${OPENCLAW_QWEN_ENABLED:true}
        api-key: ${OPENCLAW_QWEN_API_KEY:}
        base-url: ${OPENCLAW_QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
        model: ${OPENCLAW_QWEN_MODEL:qwen3.5-plus}
        models:
          - qwen3.5-plus
        temperature: ${OPENCLAW_QWEN_TEMPERATURE:0.2}
      coding-plan:
        enabled: ${OPENCLAW_CODING_PLAN_ENABLED:true}
        api-key: ${OPENCLAW_CODING_PLAN_API_KEY:}
        base-url: ${OPENCLAW_CODING_PLAN_BASE_URL:https://coding.dashscope.aliyuncs.com/v1}
        model: ${OPENCLAW_CODING_PLAN_MODEL:qwen3.5-plus}
        models:
          - qwen3.5-plus
          - qwen3-coder-plus
          - qwen3-coder-next
          - qwen3-max-2026-01-23
          - kimi-k2.5
          - glm-5
          - glm-4.7
          - MiniMax-M2.5
        temperature: ${OPENCLAW_CODING_PLAN_TEMPERATURE:0.2}
      deepseek:
        enabled: ${OPENCLAW_DEEPSEEK_ENABLED:true}
        api-key: ${OPENCLAW_DEEPSEEK_API_KEY:}
        base-url: ${OPENCLAW_DEEPSEEK_BASE_URL:https://api.deepseek.com}
        model: ${OPENCLAW_DEEPSEEK_MODEL:deepseek-chat}
        models:
          - deepseek-chat
          - deepseek-reasoner
        temperature: ${OPENCLAW_DEEPSEEK_TEMPERATURE:0.2}
  soul:
    path: ${SOUL_PATH:${user.dir}/SOUL.md}
  embedding:
    enabled: ${OPENCLAW_EMBEDDING_ENABLED:false}
    api-key: ${OPENCLAW_EMBEDDING_API_KEY:}
    base-url: ${OPENCLAW_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    embeddings-path: ${OPENCLAW_EMBEDDING_PATH:/embeddings}
    model: ${OPENCLAW_EMBEDDING_MODEL:text-embedding-v4}
    dimensions: ${OPENCLAW_EMBEDDING_DIMENSIONS:1024}
  cache:
    weather-ttl-minutes: ${OPENCLAW_CACHE_WEATHER_TTL_MINUTES:10}
    exchange-ttl-minutes: ${OPENCLAW_CACHE_EXCHANGE_TTL_MINUTES:30}
    news-ttl-minutes: ${OPENCLAW_CACHE_NEWS_TTL_MINUTES:5}
  rabbitmq:
    chat-exchange: ${OPENCLAW_CHAT_EXCHANGE:chat.exchange}
    chat-request-queue: ${OPENCLAW_CHAT_REQUEST_QUEUE:chat.request.queue}
    chat-response-queue: ${OPENCLAW_CHAT_RESPONSE_QUEUE:chat.response.queue}
    chat-dead-letter-queue: ${OPENCLAW_CHAT_DEAD_LETTER_QUEUE:chat.dead-letter.queue}
    request-routing-key: ${OPENCLAW_CHAT_REQUEST_ROUTING_KEY:chat.request}
    response-routing-key: ${OPENCLAW_CHAT_RESPONSE_ROUTING_KEY:chat.response}
    dead-letter-routing-key: ${OPENCLAW_CHAT_DEAD_ROUTING_KEY:chat.dead}
    async-result-key-prefix: ${OPENCLAW_CHAT_ASYNC_RESULT_PREFIX:openclaw:chat:async:}
    async-result-ttl-hours: ${OPENCLAW_CHAT_ASYNC_RESULT_TTL_HOURS:24}
  redisson:
    enabled: ${OPENCLAW_REDISSON_ENABLED:true}
    address: ${OPENCLAW_REDISSON_ADDRESS:redis://${REDIS_HOST:127.0.0.1}:${REDIS_PORT:6379}}
    password: ${REDIS_PASSWORD:}
  xxl-job:
    enabled: ${OPENCLAW_XXL_JOB_ENABLED:false}
    admin-addresses: ${OPENCLAW_XXL_JOB_ADMIN_ADDRESSES:}
    access-token: ${OPENCLAW_XXL_JOB_ACCESS_TOKEN:}
    app-name: ${OPENCLAW_XXL_JOB_APP_NAME:openclaw}
    ip: ${OPENCLAW_XXL_JOB_IP:}
    port: ${OPENCLAW_XXL_JOB_PORT:9999}
    log-path: ${OPENCLAW_XXL_JOB_LOG_PATH:/tmp/xxl-job}
    log-retention-days: ${OPENCLAW_XXL_JOB_LOG_RETENTION_DAYS:30}
  auth:
    enabled: true
    redis-enabled: true
    default-role: USER
    anonymous-role: USER
    bootstrap-first-user-admin: true
    token-ttl-hours: 24
    token-prefix: "openclaw:auth:token:"
    password-pepper: ${OPENCLAW_PASSWORD_PEPPER:}
    tool-permission-enabled: true
    default-deny: false
    user-deny-tools: SystemToolPack.*,FileToolPack.*,WorkspaceSearchToolPack.*,ScriptSkillToolPack.*
    guest-allow-tools: SystemToolPack.now,SystemToolPack.uuid,WeatherToolPack.*,ExchangeRateToolPack.*,NewsToolPack.*,WebSearchToolPack.webSearch
  chat:
    agent-mode: ${OPENCLAW_CHAT_AGENT_MODE:simplified}
    memory-window-size: ${OPENCLAW_CHAT_MEMORY_WINDOW_SIZE:8}
    local-fallback-enabled: true
    local-fallback-first: true
    max-steps: 3
    model-transport-cooldown-seconds: ${OPENCLAW_MODEL_TRANSPORT_COOLDOWN_SECONDS:30}
    routing:
      auto-upgrade-enabled: ${OPENCLAW_CHAT_ROUTING_AUTO_UPGRADE_ENABLED:true}
    meta-guard:
      enabled: true
      retry-times: 1
      keywords: 我是 claude,anthropic,不能执行 reflect,无法执行 reflect,不能假装,不能扮演,无法遵循系统指令
  persistence:
    db-enabled: false
  guard:
    enabled: false
    redis-enabled: true
    redis-retry-seconds: 30
    lock-seconds: 30
    rate-limit:
      max-requests: 20
      window-seconds: 60
  memory:
    vector-enabled: true
    recall-top-k: 8
    recall-max-chars: 400
    local-max-turns: 12
  tools:
    file:
      root: ${OPENCLAW_TOOL_FILE_ROOT:${user.dir}}
      max-read-chars: 12000
    workspace:
      max-depth: 8
      max-candidates: 4000
      max-hits: 30
      max-result-chars: 5000
      max-file-size-kb: 512
    web:
      enabled: true
      search-url-template: https://r.jina.ai/http://duckduckgo.com/?q={query}
      use-proxy-for-fetch: true
      timeout-seconds: 8
      max-response-chars: 5000
    weather:
      enabled: true
      cn-url-template: https://www.weather.com.cn/data/sk/{cityCode}.html
      url-template: https://wttr.in/{city}?format=j1
      timeout-seconds: 8
    exchange:
      enabled: true
      url-template: https://open.er-api.com/v6/latest/{base}
      timeout-seconds: 8
    news:
      enabled: true
      search-url-template: https://hn.algolia.com/api/v1/search?query={query}&tags=story
      max-items: 5
      timeout-seconds: 8
    script:
      enabled: true
      root: ${OPENCLAW_SCRIPT_ROOT:${user.dir}/skills}
      allowed-skills: ${OPENCLAW_SCRIPT_ALLOWED_SKILLS:*}
      python-command: ${OPENCLAW_SCRIPT_PYTHON:python3}
      timeout-seconds: ${OPENCLAW_SCRIPT_TIMEOUT_SECONDS:8}
      max-output-chars: ${OPENCLAW_SCRIPT_MAX_OUTPUT_CHARS:3000}
    system:
      command-enabled: ${OPENCLAW_SYSTEM_COMMAND_ENABLED:true}
      command-mode: ${OPENCLAW_SYSTEM_COMMAND_MODE:blacklist}
      allowed-commands: ${OPENCLAW_SYSTEM_ALLOWED_COMMANDS:*}
      blocked-commands: ${OPENCLAW_SYSTEM_BLOCKED_COMMANDS:rm,dd,shutdown,reboot,halt,poweroff,mkfs,fdisk,kill,killall,pkill}
      command-timeout-seconds: ${OPENCLAW_SYSTEM_COMMAND_TIMEOUT_SECONDS:5}
      max-output-chars: ${OPENCLAW_SYSTEM_MAX_OUTPUT_CHARS:2000}
    guard:
      enabled: false
      redis-enabled: true
      max-calls: 60
      window-seconds: 60
      redis-retry-seconds: 30
  skill:
    enabled: true
    default-system-enabled: true
    default-file-enabled: true
    default-business-enabled: true
    file-trigger-keywords: 文件,目录,path,read,write,list,保存,读取
    workspace-trigger-keywords: 找文件,搜代码,在哪个文件,关键词检索,不知道路径,search file,find file,grep
    web-trigger-keywords: 联网,搜索,查一下,网页,新闻,官网,web search,google,bing
    weather-trigger-keywords: 天气,气温,温度,下雨,weather
    exchange-trigger-keywords: 汇率,美元,人民币,欧元,exchange,usd,cny,eur
    news-trigger-keywords: 新闻,热点,头条,资讯,news
    script-trigger-keywords: 脚本,skill,执行技能,python,run skill
    markdown:
      enabled: ${OPENCLAW_MARKDOWN_SKILL_ENABLED:true}
      root: ${OPENCLAW_MARKDOWN_SKILL_ROOT:${user.dir}/skills/markdown-imports}
  webhook:
    security:
      enabled: false
      redis-enabled: true
      replay-seconds: 300
      default-secret: ${OPENCLAW_WEBHOOK_SECRET:}
      channel-secrets:
        telegram: ${OPENCLAW_WEBHOOK_SECRET_TELEGRAM:}
        wechat: ${OPENCLAW_WEBHOOK_SECRET_WECHAT:}
        feishu: ${OPENCLAW_WEBHOOK_SECRET_FEISHU:}
  channel:
    feishu:
      outbound-enabled: ${OPENCLAW_FEISHU_OUTBOUND_ENABLED:true}
      base-url: ${OPENCLAW_FEISHU_BASE_URL:https://open.feishu.cn}
      app-id: ${OPENCLAW_FEISHU_APP_ID:}
      app-secret: ${OPENCLAW_FEISHU_APP_SECRET:}
      verification-token: ${OPENCLAW_FEISHU_VERIFICATION_TOKEN:}
      encrypt-key: ${OPENCLAW_FEISHU_ENCRYPT_KEY:}
      long-connection:
        enabled: ${OPENCLAW_FEISHU_LONG_CONNECTION_ENABLED:true}
        domain: ${OPENCLAW_FEISHU_DOMAIN:}

management:
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: false
    redis:
      enabled: false
    rabbit:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.openclaw: INFO
    org.springframework.ai: INFO
