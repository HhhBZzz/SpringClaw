name: Memory Redline Gate

on:
  pull_request:
    branches:
      - codex/bootstrap-github
  workflow_dispatch:

jobs:
  memory-redline-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run memory redline gate
        run: scripts/check-memory-redline-gate.sh
